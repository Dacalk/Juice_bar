[build]
  command = "npm run build"
  publish = "Frontend/dist"

[build.environment]
  NPM_FLAGS = "--include=dev"
  NODE_VERSION = "20"

[functions]
  directory = "Backend/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
